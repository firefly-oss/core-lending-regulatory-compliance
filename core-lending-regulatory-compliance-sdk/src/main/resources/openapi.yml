components:
  schemas:
    ReportingRunDTO:
      required:
      - reportType
      - reportingPeriodEnd
      - reportingPeriodStart
      - runStatus
      type: object
      properties:
        reportingRunId:
          type: string
          format: uuid
          readOnly: true
        reportType:
          type: string
          enum:
          - CIRBE
          - FINREP
          - AML
          - COREP
          - SEPBLAC
        reportingPeriodStart:
          type: string
          format: date
        reportingPeriodEnd:
          type: string
          format: date
        runStatus:
          type: string
          enum:
          - OPEN
          - IN_PROGRESS
          - COMPLETED
          - FAILED
          - CANCELLED
        remarks:
          maxLength: 1000
          minLength: 0
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    RegulatorySubmissionDTO:
      required:
      - reportingRunId
      - submissionDate
      - submissionRef
      - submissionStatus
      type: object
      properties:
        regulatorySubmissionId:
          type: string
          format: uuid
          readOnly: true
        reportingRunId:
          type: string
          format: uuid
        submissionRef:
          maxLength: 100
          minLength: 0
          type: string
        submissionDate:
          type: string
          format: date
        submissionStatus:
          type: string
          enum:
          - SUBMITTED
          - ACCEPTED
          - REJECTED
          - REVISED
          - SUPERSEDED
        responseDetails:
          maxLength: 2000
          minLength: 0
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ReportingRecordDTO:
      required:
      - currencyCode
      - customerId
      - isIncluded
